name: Crypto Agent Scan

# Runs the bot on GitHub's free servers, no laptop needed.
on:
  schedule:
    - cron: "3,18,33,48 * * * *"   # ~every 15 min, offset off the busy :00/:15/:30/:45 marks
  workflow_dispatch: {}       # also lets you run it manually from the website

# Needed to publish the dashboard to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install libraries
        run: pip install -r requirements.txt

      # Remember past signals/trades between runs.
      - name: Restore data
        uses: actions/cache@v4
        with:
          path: database/crypto.db
          key: crypto-db-${{ github.run_id }}
          restore-keys: crypto-db-

      - name: Create database if missing
        run: python database_manager.py

      - name: Run one scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scan_once.py

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Upload dashboard for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
