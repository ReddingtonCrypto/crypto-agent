name: Crypto Agent Scan

# Runs the bot on GitHub's free servers, no laptop needed.
# Triggered every 15 min by cron-job.org via workflow_dispatch (GitHub's own
# schedule cron proved unreliable for this repo AND double-ran when it did
# fire alongside the external trigger — so it was removed).
on:
  workflow_dispatch: {}       # also lets you run it manually from the website

# contents: write lets the workflow commit the trade-history CSV backup;
# pages/id-token publish the dashboard to GitHub Pages.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install libraries
        run: pip install -r requirements.txt

      # Remember past signals/trades between runs.
      - name: Restore data
        uses: actions/cache@v4
        with:
          path: database/crypto.db
          key: crypto-db-v5-${{ github.run_id }}
          restore-keys: crypto-db-v5-

      - name: Create database if missing
        run: python database_manager.py

      - name: Run one scan
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scan_once.py

      # The database only lives in the Actions cache, which GitHub can evict
      # at any time — commit the trade history to the repo so the forward-test
      # record is permanent. Only commits when the history actually changed.
      - name: Back up trade history to the repo
        run: |
          python export_history.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history/paper_trades.csv
          if git diff --cached --quiet; then
            echo "History unchanged - nothing to commit."
          else
            git commit -m "backup: paper-trade history"
            git pull --rebase origin main
            git push
          fi

      - name: Build dashboard
        run: python build_dashboard.py

      - name: Upload dashboard for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # If anything above failed, say so on Telegram — otherwise a broken
      # scan just looks like a quiet market and a stale dashboard.
      - name: Telegram ping on failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ Crypto-agent scan FAILED: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publish to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
